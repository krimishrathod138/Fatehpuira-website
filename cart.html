<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Fatehpuria</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts: Inter & Manrope -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-100 py-6">
        <div class="container mx-auto px-6 lg:px-16 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <img src="logo.png" alt="Fatehpuria" class="h-8 md:h-10 w-auto object-contain">
            </a>
            <a href="index.html" class="text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-blue-700 transition">Continue Shopping</a>
        </div>
    </header>
    <main class="flex-grow container mx-auto px-6 lg:px-16 py-24 flex flex-col items-center justify-center text-center">
        <div class="bg-white p-16 rounded-2xl shadow-xl border border-slate-100 max-w-xl w-full">
            <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-8">
                <i class="fa-solid fa-cart-shopping text-3xl text-slate-300"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 mb-6 uppercase tracking-tight">Your cart is empty</h1>
            <p class="text-slate-500 mb-10 font-light text-lg">Looks like you haven't added any partner brands or services to your inquiry list yet.</p>
            <a href="index.html" class="btn-corporate !px-12 !py-4 rounded-xl shadow-lg">
                Explore Our Services
            </a>
            <div class="mt-16 pt-16 border-t border-slate-100">
                <p class="text-sm text-slate-500">Have an account? <a href="login.html" class="text-blue-700 font-bold hover:underline">Log in</a> to view your saved items.</p>
            </div>
        </div>
    </main>
    <footer class="bg-white py-10 border-t border-slate-100">
        <div class="container mx-auto px-4 text-center text-[10px] text-slate-400 uppercase tracking-widest font-medium">
            <p>&copy; 2026 Fatehpuria Hygiene Pvt Ltd. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>

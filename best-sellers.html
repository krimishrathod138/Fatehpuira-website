<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Sellers - Fatehpuria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Assistant', sans-serif; }</style>
</head>
<body class="bg-white text-[#121212]">
    <div class="bg-[#121212] text-white text-center py-2 text-xs uppercase tracking-[.2em] font-light">Free Shipping on all orders above ₹2000!</div>
    <header class="sticky top-0 z-50 bg-white border-b border-[rgba(18,18,18,0.08)]">
        <div class="container mx-auto px-4 lg:px-12 py-5 flex items-center justify-between">
            <button class="lg:hidden text-2xl" id="menu-btn" aria-label="Open Menu"><i class="fa-solid fa-bars"></i></button>
            <a href="index.html" class="flex items-center">
                <img src="logo.png" alt="Fatehpuria" class="h-8 md:h-10 w-auto object-contain">
            </a>
            <nav class="hidden lg:flex space-x-10 text-[13px] font-normal uppercase tracking-[.1em]">
                <a href="index.html" class="hover:underline underline-offset-[6px]">Home</a>
                <a href="new-arrivals.html" class="hover:underline underline-offset-[6px]">New Arrivals</a>
                <a href="best-sellers.html" class="underline underline-offset-[6px]">Best Sellers</a>
                <a href="sarees.html" class="hover:underline underline-offset-[6px]">Sarees</a>
                <a href="contact.html" class="hover:underline underline-offset-[6px]">Contact</a>
            </nav>
            <div class="flex items-center space-x-8 text-xl">
                <a href="#"><i class="fa-solid fa-magnifying-glass text-lg"></i></a>
                <!-- Removed Login and Cart -->
            </div>
        </div>
    </header>
    <main class="container mx-auto px-4 lg:px-12 py-16">
        <h1 class="text-4xl font-light uppercase tracking-[.1em] mb-4 text-center">Best Sellers</h1>
        <p class="text-center text-gray-500 mb-12 uppercase tracking-widest text-sm">Our most loved and sought-after pieces</p>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div class="group cursor-pointer">
                <div class="relative overflow-hidden mb-5 aspect-[3/4] bg-[#f9f9f9]">
                    <img src="https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?q=80&w=1964&auto=format&fit=crop" alt="Product" class="object-cover w-full h-full group-hover:scale-105 transition duration-700">
                    <div class="absolute top-3 left-3 bg-[#121212] text-white text-[10px] px-2 py-1 uppercase tracking-widest font-medium">Bestseller</div>
                    <button class="absolute bottom-0 left-0 right-0 bg-[#121212] text-white py-3 text-[11px] uppercase tracking-[.2em] font-medium opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-2 group-hover:translate-y-0">Quick Add</button>
                </div>
                <div class="text-left px-1">
                    <h3 class="text-[13px] font-normal text-[#121212] uppercase tracking-[.05em] mb-2 group-hover:underline underline-offset-4">Royal Bridal Lehenga</h3>
                    <p class="text-[14px] text-[#121212] font-light tracking-wider">₹24,999.00</p>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-white pt-20 pb-10 border-t border-[rgba(18,18,18,0.08)]">
        <div class="container mx-auto px-4 lg:px-12 text-center text-[11px] text-gray-500 uppercase tracking-[.15em]"><p>&copy; 2026, Fatehpuria. All Rights Reserved.</p></div>
    </footer>
    <div id="mobile-menu" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden transition-opacity duration-300">
        <div class="bg-white w-4/5 h-full p-8 space-y-8 transform -translate-x-full transition-transform duration-300">
            <div class="flex justify-between items-center"><span class="text-xl font-bold uppercase">Menu</span><button id="close-menu" aria-label="Close Menu"><i class="fa-solid fa-xmark text-2xl"></i></button></div>
            <nav class="flex flex-col space-y-6 text-sm uppercase tracking-widest">
                <a href="index.html">Home</a>
                <a href="new-arrivals.html">New Arrivals</a>
                <a href="best-sellers.html" class="font-bold">Best Sellers</a>
                <a href="sarees.html">Sarees</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

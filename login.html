<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fatehpuria</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts: Inter & Manrope -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-100 py-6 text-center">
        <div class="flex justify-center">
            <a href="index.html" class="flex items-center">
                <img src="logo.png" alt="Fatehpuria" class="h-8 md:h-10 w-auto object-contain">
            </a>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center py-20 px-6">
        <div class="bg-white p-12 rounded-2xl shadow-xl border border-slate-100 w-full max-w-md">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-8 text-center uppercase tracking-tight">Login</h1>
            <form class="space-y-6">
                <div>
                    <label class="text-[10px] uppercase tracking-widest font-bold text-slate-400 mb-2 block">Email Address</label>
                    <input type="email" placeholder="email@company.com" class="w-full border border-slate-200 px-4 py-3 rounded-xl focus:outline-none focus:border-blue-700 transition font-normal bg-slate-50">
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest font-bold text-slate-400 mb-2 block">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full border border-slate-200 px-4 py-3 rounded-xl focus:outline-none focus:border-blue-700 transition font-normal bg-slate-50">
                </div>
                <div class="flex justify-between items-center text-sm">
                    <a href="#" class="text-blue-700 hover:underline">Forgot password?</a>
                </div>
                <button type="submit" class="w-full btn-corporate !py-4 rounded-xl shadow-lg">Sign In</button>
                <div class="text-center text-sm text-slate-500 pt-4">
                    Don't have an account? <a href="#" class="text-blue-700 font-semibold hover:underline">Create one</a>
                </div>
            </form>
        </div>
    </main>
    <footer class="bg-white py-10 border-t border-slate-100">
        <div class="container mx-auto px-4 text-center text-[10px] text-slate-400 uppercase tracking-widest font-medium">
            <p>&copy; 2026 Fatehpuria Hygiene Pvt Ltd. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
